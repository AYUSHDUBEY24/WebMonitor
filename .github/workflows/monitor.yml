name: Monitor Website Health

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: monitor-health
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run health check
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
        run: |
          python monitor.py || echo "MONITOR_FAILED=1" >> "$GITHUB_ENV"

      - name: Generate report
        run: python report.py

      - name: Commit logs/report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/uptime_log.csv logs/daily_report.md
          git diff --staged --quiet || git commit -m "chore: update health logs [skip ci]"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: health-monitor-artifacts
          path: |
            logs/uptime_log.csv
            logs/daily_report.md

      - name: Monitoring status summary
        if: env.MONITOR_FAILED == '1'
        run: echo "One or more targets were DOWN. Logged and alerted."
