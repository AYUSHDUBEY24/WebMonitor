name: Daily Uptime Report

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * *"

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily report
        run: python report.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/daily_report.md
          git diff --staged --quiet || git commit -m "docs: update daily uptime report [skip ci]"
          git push
